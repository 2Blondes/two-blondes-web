services:
  - type: web
    name: two-blondes-backend
    env: node
    branch: main
    root: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
        sync: false
      - key: PUBLIC_URL
        value: https://two-blondes.onrender.com
        sync: false
      - key: MONGODB_URI
        value: ""
      - key: EMAIL_USER
        value: ""
      - key: EMAIL_PASS
        value: ""
      - key: OWNER_EMAIL
        value: ""
      - key: MASTER_ADMIN_PASSWORD
        value: ""
      - key: JWT_SECRET
        value: ""
